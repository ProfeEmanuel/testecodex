<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizador de Rotina</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d8deea;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    p { margin: 0 0 16px; color: var(--muted); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    table {
      border-collapse: collapse;
      min-width: 1000px;
      width: 100%;
      table-layout: fixed;
      background: #fff;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px;
      text-align: center;
      vertical-align: top;
      min-height: 48px;
    }

    thead th {
      background: #eff6ff;
      font-size: 0.92rem;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody th {
      background: #f8fafc;
      text-align: left;
      width: 160px;
      font-size: 0.95rem;
    }

    td[contenteditable="true"] {
      outline: none;
      cursor: text;
      text-align: left;
    }

    td[contenteditable="true"]:focus {
      box-shadow: inset 0 0 0 2px #93c5fd;
      background: #f8fbff;
    }

    .footer-note {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Organizador de Rotina</h1>
    <p>Preencha suas tarefas na célula do dia e horário correspondente.</p>

    <div class="actions">
      <button class="primary" id="saveBtn">Salvar rotina</button>
      <button id="clearBtn">Limpar tabela</button>
    </div>

    <div class="table-wrap">
      <table id="rotinaTable" aria-label="Tabela de rotina semanal"></table>
    </div>

    <div class="footer-note">
      Dica: os dados ficam salvos automaticamente no navegador.
    </div>
  </main>

  <script>
    const diasSemana = [
      'Segunda-feira',
      'Terça-feira',
      'Quarta-feira',
      'Quinta-feira',
      'Sexta-feira',
      'Sábado',
      'Domingo'
    ];

    const horarios = [
      '06:00', '07:00', '08:00', '09:00', '10:00', '11:00',
      '12:00', '13:00', '14:00', '15:00', '16:00', '17:00',
      '18:00', '19:00', '20:00', '21:00', '22:00'
    ];

    const storageKey = 'organizador-rotina-v1';
    const table = document.getElementById('rotinaTable');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');

    function buildTable() {
      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');

      const canto = document.createElement('th');
      canto.textContent = 'Dia / Horário';
      headRow.appendChild(canto);

      horarios.forEach((hora) => {
        const th = document.createElement('th');
        th.textContent = hora;
        headRow.appendChild(th);
      });

      thead.appendChild(headRow);

      const tbody = document.createElement('tbody');
      diasSemana.forEach((dia, linhaIndex) => {
        const tr = document.createElement('tr');

        const diaCell = document.createElement('th');
        diaCell.scope = 'row';
        diaCell.textContent = dia;
        tr.appendChild(diaCell);

        horarios.forEach((_, colIndex) => {
          const td = document.createElement('td');
          td.contentEditable = 'true';
          td.dataset.row = linhaIndex;
          td.dataset.col = colIndex;
          td.setAttribute('aria-label', `${dia} às ${horarios[colIndex]}`);
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });

      table.replaceChildren(thead, tbody);
    }

    function getTableData() {
      const data = {};
      const cells = table.querySelectorAll('td[contenteditable="true"]');
      cells.forEach((cell) => {
        const key = `${cell.dataset.row}-${cell.dataset.col}`;
        data[key] = cell.textContent.trim();
      });
      return data;
    }

    function setTableData(data) {
      const cells = table.querySelectorAll('td[contenteditable="true"]');
      cells.forEach((cell) => {
        const key = `${cell.dataset.row}-${cell.dataset.col}`;
        cell.textContent = data[key] || '';
      });
    }

    function saveData() {
      localStorage.setItem(storageKey, JSON.stringify(getTableData()));
      saveBtn.textContent = 'Salvo!';
      setTimeout(() => {
        saveBtn.textContent = 'Salvar rotina';
      }, 900);
    }

    function loadData() {
      const raw = localStorage.getItem(storageKey);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        setTableData(data);
      } catch {
        localStorage.removeItem(storageKey);
      }
    }

    function clearTable() {
      table.querySelectorAll('td[contenteditable="true"]').forEach((cell) => {
        cell.textContent = '';
      });
      localStorage.removeItem(storageKey);
    }

    buildTable();
    loadData();

    table.addEventListener('input', saveData);
    saveBtn.addEventListener('click', saveData);
    clearBtn.addEventListener('click', clearTable);
  </script>
</body>
</html>
